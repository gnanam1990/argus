name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # -race requires cgo; ubuntu runners ship a C compiler.
      - name: go test -race
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: go build
        run: go build ./...

  robotgo:
    name: Build robotgo backend (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # The native driver + its CLI wiring are CGo + build-tagged; validate they
      # compile on a real macOS runner (excluded from the default matrix).
      - name: go build -tags robotgo
        run: CGO_ENABLED=1 go build -tags robotgo ./internal/driver/robotgo/ ./cmd/argus/ ./cmd/argus-mcp/
      - name: go test -tags robotgo
        run: CGO_ENABLED=1 go test -tags robotgo ./internal/driver/robotgo/... ./internal/grounder/ax/...
      # The default Lint job runs staticcheck without build tags, so it never
      # sees the robotgo/cgo files. Lint them here on the macOS runner too.
      - name: staticcheck -tags robotgo
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          CGO_ENABLED=1 "$(go env GOPATH)/bin/staticcheck" -tags robotgo ./internal/driver/robotgo/... ./internal/grounder/ax/...

  robotgo-windows:
    name: Build robotgo backend (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # The Windows native path was previously never compiled anywhere; the
      # runner ships a MinGW gcc for the CGo build.
      - name: go build -tags robotgo
        run: go build -tags robotgo ./internal/driver/robotgo/ ./cmd/argus/ ./cmd/argus-mcp/
        env:
          CGO_ENABLED: "1"
      - name: go test -tags robotgo
        run: go test -tags robotgo ./internal/driver/robotgo/...
        env:
          CGO_ENABLED: "1"

  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: No secret-like files tracked
        run: |
          matches="$(git ls-files | grep -E '(^|/)(\.env(\..+)?|.+\.pem|id_rsa.*|.+\.key)$' || true)"
          if [ -n "$matches" ]; then
            echo "::error::secret-like files are tracked:"
            echo "$matches"
            exit 1
          fi
      - name: No prior-art brand names in source
        run: |
          # Scan tracked source/docs (excluding this CI config, which necessarily
          # names the denylist) for prior-art project brand tokens.
          files="$(git ls-files | grep -vE '^\.github/' || true)"
          if [ -n "$files" ] && printf '%s\n' "$files" | xargs grep -riEwn 'trycua|cua' 2>/dev/null; then
            echo "::error::prior-art brand name found in tracked files"
            exit 1
          fi

  license-scan:
    name: License scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # Fail if any dependency in the shipped (default, CGo-free) build is
      # copyleft (GPL/AGPL) — the OmniParser AGPL guard. robotgo deps are
      # build-tagged out of the default graph and not scanned here.
      - name: No copyleft dependencies
        run: go run github.com/google/go-licenses@latest check ./... --disallowed_types=restricted
